# Test config for the TMC5262 driver

[stepper_x]
step_pin: PC0
dir_pin: PL0
enable_pin: !PA7
microsteps: 16
rotation_distance: 40
endstop_pin: ^PB6
position_endstop: 0
position_max: 250

[tmc5262 stepper_x]
cs_pin: PG0
run_current: 1.2
hold_current: 0.5
rref: 12000

[stepper_x1]
step_pin: PC3
dir_pin: PL6
microsteps: 16
rotation_distance: 40
endstop_pin: ^PB7

[tmc5262 stepper_x1]
cs_pin: PG1
run_current: 0.4
rref: 12000
current_range: 0
current_range_scale: 1
driver_TOFF: 4
driver_HSTRT: 4
driver_HEND: 1

[stepper_y]
step_pin: PC1
dir_pin: PL1
microsteps: 16
rotation_distance: 40
endstop_pin: ^PB4
position_endstop: 0
position_max: 200

[stepper_z]
step_pin: PC2
dir_pin: PL2
microsteps: 16
rotation_distance: 8
endstop_pin: ^PB5
position_endstop: 0.5
position_max: 200

[mcu]
serial: /dev/ttyACM0

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100
